<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TryDevTools</title>
<meta name="description" content="Developer utility — runs locally in your browser."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=16"/>
<style>
  :root{--bg:#0d0f14;--bg-1:#12151c;--bg-2:#181c26;--bg-3:#1e2330;--bg-hover:#232a38;--line:rgba(255,255,255,0.07);--line-strong:rgba(255,255,255,0.13);--ink:#f0f2f8;--ink-2:#9ba3b8;--ink-3:#5d6882;--accent:#6366f1;--accent-hi:#818cf8;--accent-soft:rgba(99,102,241,0.12);--accent-glow:rgba(99,102,241,0.25);--ok:#34d399;--err:#f87171;--font:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,Menlo,monospace;--r:8px;--r-lg:14px;--r-xl:20px;--shadow-lg:0 12px 48px rgba(0,0,0,.6);--glow:0 0 0 1px var(--accent-glow),0 4px 24px var(--accent-glow)}
  html[data-theme="light"]{--bg:#f5f6fa;--bg-1:#fff;--bg-2:#f0f1f7;--bg-3:#e8eaf3;--bg-hover:#eceef8;--line:rgba(0,0,0,0.07);--line-strong:rgba(0,0,0,0.14);--ink:#111827;--ink-2:#4b5568;--ink-3:#9ca3af;--accent:#4f46e5;--accent-hi:#6366f1;--accent-soft:rgba(79,70,229,0.08);--accent-glow:rgba(79,70,229,0.2)}
  *,*::before,*::after{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none} button{font:inherit;cursor:pointer;border:none;background:none}
  .logo{display:inline-flex;align-items:center;gap:10px;flex-shrink:0;white-space:nowrap;color:var(--ink)}
  .logo-mark{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logo-text{display:flex;flex-direction:column;gap:2px;white-space:nowrap;line-height:1}
  .logo-text .brand{display:block;font-size:13.5px;font-weight:700;letter-spacing:-0.02em;color:var(--ink)}
  .logo-text .tagline{display:block;font-size:8.5px;font-weight:500;color:var(--ink-3);letter-spacing:.05em;text-transform:uppercase;font-family:var(--mono)}
  .site-header{position:sticky;top:0;z-index:100;height:64px;background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .site-header-inner{display:flex;align-items:center;gap:20px;height:100%}
  .container{max-width:1280px;margin:0 auto;padding:0 40px}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--line);background:var(--bg-2);color:var(--ink-2);font-family:var(--mono);white-space:nowrap}
  .chip.accent{background:var(--accent-soft);border-color:rgba(99,102,241,.25);color:var(--accent-hi)}
</style>
<script>
  try {
    const t = localStorage.getItem("dth_theme"); if (t) document.documentElement.dataset.theme = t;
    const d = localStorage.getItem("dth_density"); if (d) document.documentElement.dataset.density = d;
    const a = localStorage.getItem("dth_accent");
    const ACC = {lime:["oklch(0.82 0.19 132)","oklch(0.28 0.08 132)","oklch(0.95 0.08 132)"],violet:["oklch(0.72 0.18 295)","oklch(0.98 0.02 295)","oklch(0.95 0.04 295)"],amber:["oklch(0.82 0.15 75)","oklch(0.28 0.07 75)","oklch(0.96 0.06 75)"],sky:["oklch(0.78 0.13 230)","oklch(0.25 0.06 230)","oklch(0.95 0.04 230)"]};
    if (a && ACC[a]) { const r=document.documentElement.style; r.setProperty("--accent",ACC[a][0]); r.setProperty("--accent-ink",ACC[a][1]); r.setProperty("--accent-soft",ACC[a][2]); }
  } catch(e){}
</script>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>
<script src="data.js?v=16"></script>
<script type="text/babel" src="components.jsx?v=16"></script>
<script type="text/babel" src="tools/json.jsx?v=16"></script>
<script type="text/babel" src="tools/text.jsx?v=16"></script>
<script type="text/babel" src="tools/markdown.jsx?v=16"></script>
<script type="text/babel" src="tools/encoding.jsx?v=16"></script>
<script type="text/babel" src="tools/converters.jsx?v=16"></script>
<script type="text/babel" src="tools/formatters.jsx?v=16"></script>
<script type="text/babel" src="tools/utilities.jsx?v=16"></script>
<script type="text/babel" src="tools/color.jsx?v=16"></script>
<script type="text/babel" src="tools/time.jsx?v=16"></script>
<script type="text/babel" src="tools/regex.jsx?v=16"></script>
<script type="text/babel" src="tools/images.jsx?v=16"></script>
<script type="text/babel" src="tool-page.jsx?v=16"></script>
<script type="text/babel">
  const params = new URLSearchParams(location.search);
  const slug = params.get("t") || "json-formatter";
  const tool = window.TOOLS.find(t => t.slug === slug);
  if (tool) document.title = `${tool.name} — devtoolshub`;
  ReactDOM.createRoot(document.getElementById("root")).render(<ToolPage slug={slug}/>);
</script>
</body>
</html>
